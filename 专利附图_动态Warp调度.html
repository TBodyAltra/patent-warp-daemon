<!DOCTYPE html>

<h1>专利附图</h1>

<!-- 图1 -->
<div class="figure">
    <div class="figure-number">图1</div>
    <div class="figure-title">传统静态 Warp-Specialize 示意</div>
    <svg width="700" height="350" viewBox="0 0 700 350">
        <!-- 标题 -->
        <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold">传统静态 Warp-Specialize（现有技术）</text>
        
        <!-- 编译时 -->
        <rect x="30" y="50" width="150" height="30" fill="#9b59b6" rx="3"/>
        <text x="105" y="70" text-anchor="middle" fill="white" font-size="12">编译时静态划分</text>
        
        <line x1="190" y1="65" x2="250" y2="65" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
        
        <!-- Warp分配 -->
        <rect x="260" y="45" width="180" height="50" fill="#3498db" rx="3"/>
        <text x="350" y="65" text-anchor="middle" fill="white" font-size="12">Warp 0-3: Producer</text>
        <text x="350" y="82" text-anchor="middle" fill="white" font-size="10">（固定加载数据）</text>
        
        <rect x="260" y="105" width="180" height="50" fill="#e74c3c" rx="3"/>
        <text x="350" y="125" text-anchor="middle" fill="white" font-size="12">Warp 4-7: Consumer</text>
        <text x="350" y="142" text-anchor="middle" fill="white" font-size="10">（固定计算）</text>
        
        <!-- 箭头到运行时 -->
        <line x1="450" y1="80" x2="510" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
        
        <!-- 运行时时间线 -->
        <text x="530" y="40" font-size="12" fill="#666">运行时（固定不变）</text>
        <text x="680" y="55" font-size="10" fill="#666">时间→</text>
        
        <!-- Producer时间线 -->
        <rect x="530" y="60" width="120" height="25" fill="#3498db" rx="3"/>
        <text x="590" y="77" text-anchor="middle" fill="white" font-size="11">Producer工作</text>
        
        <rect x="530" y="90" width="120" height="25" fill="#95a5a6" rx="3"/>
        <text x="590" y="107" text-anchor="middle" fill="white" font-size="11">空闲等待</text>
        
        <!-- Consumer时间线 -->
        <rect x="530" y="125" width="60" height="25" fill="#95a5a6" rx="3"/>
        <text x="560" y="142" text-anchor="middle" fill="white" font-size="11">等待</text>
        
        <rect x="600" y="125" width="120" height="25" fill="#e74c3c" rx="3"/>
        <text x="660" y="142" text-anchor="middle" fill="white" font-size="11">Consumer工作</text>
        
        <!-- 问题标注 -->
        <rect x="30" y="200" width="640" height="130" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="5"/>
        <text x="350" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">存在的问题</text>
        
        <text x="60" y="260" font-size="12" fill="#856404">1. 编译时确定角色，运行时无法调整</text>
        <text x="60" y="290" font-size="12" fill="#856404">2. Producer 工作完成后空闲等待</text>
        <text x="60" y="320" font-size="12" fill="#856404">3. 无法响应硬件资源变化</text>
        
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
            </marker>
        </defs>
    </svg>
</div>

<!-- 图2 -->
<div class="figure">
    <div class="figure-number">图2</div>
    <div class="figure-title">编译阶段 Kernel 分区划分</div>
    <svg width="750" height="400" viewBox="0 0 750 400">
        <text x="375" y="25" text-anchor="middle" font-size="14" font-weight="bold">编译阶段：Kernel 分区划分</text>
        
        <!-- 原始Kernel -->
        <rect x="50" y="50" width="200" height="120" fill="#9b59b6" rx="5"/>
        <text x="150" y="80" text-anchor="middle" fill="white" font-size="14">原始 Kernel 代码</text>
        <text x="150" y="105" text-anchor="middle" fill="white" font-size="11">for (i = 0; i < N; i++) {</text>
        <text x="150" y="125" text-anchor="middle" fill="white" font-size="11">  A = load(input + i);</text>
        <text x="150" y="145" text-anchor="middle" fill="white" font-size="11">  B = A * A;</text>
        <text x="150" y="165" text-anchor="middle" fill="white" font-size="11">  store(output + i, B);</text>
        
        <line x1="260" y1="110" x2="320" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
        
        <!-- IR分析 -->
        <rect x="330" y="80" width="100" height="60" fill="#34495e" rx="5"/>
        <text x="380" y="105" text-anchor="middle" fill="white" font-size="12">IR 分析</text>
        <text x="380" y="125" text-anchor="middle" fill="white" font-size="10">识别操作类型</text>
        
        <line x1="440" y1="110" x2="480" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
        
        <!-- 分区 -->
        <text x="530" y="50" font-size="12" font-weight="bold">分区结果：</text>
        
        <rect x="500" y="65" width="100" height="50" fill="#3498db" rx="5"/>
        <text x="550" y="85" text-anchor="middle" fill="white" font-size="12">Partition-M</text>
        <text x="550" y="103" text-anchor="middle" fill="white" font-size="10">内存操作</text>
        
        <rect x="610" y="65" width="100" height="50" fill="#e74c3c" rx="5"/>
        <text x="660" y="85" text-anchor="middle" fill="white" font-size="12">Partition-C</text>
        <text x="660" y="103" text-anchor="middle" fill="white" font-size="10">计算操作</text>
        
        <rect x="500" y="125" width="100" height="50" fill="#2ecc71" rx="5"/>
        <text x="550" y="145" text-anchor="middle" fill="white" font-size="12">Partition-H</text>
        <text x="550" y="163" text-anchor="middle" fill="white" font-size="10">混合操作</text>
        
        <!-- Task切分 -->
        <line x1="550" y1="190" x2="550" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
        
        <text x="375" y="245" text-anchor="middle" font-size="14" font-weight="bold">Task 切分（按数据维度）</text>
        
        <!-- Task块 -->
        <rect x="80" y="265" width="80" height="40" fill="#3498db" rx="3"/>
        <text x="120" y="290" text-anchor="middle" fill="white" font-size="11">Task 0</text>
        
        <rect x="170" y="265" width="80" height="40" fill="#3498db" rx="3"/>
        <text x="210" y="290" text-anchor="middle" fill="white" font-size="11">Task 1</text>
        
        <rect x="260" y="265" width="80" height="40" fill="#3498db" rx="3"/>
        <text x="300" y="290" text-anchor="middle" fill="white" font-size="11">Task 2</text>
        
        <text x="380" y="290" font-size="11" fill="#7f8c8d">...</text>
        
        <rect x="410" y="265" width="80" height="40" fill="#e74c3c" rx="3"/>
        <text x="450" y="290" text-anchor="middle" fill="white" font-size="11">Task N</text>
        
        <!-- 输入预计算 -->
        <line x1="450" y1="305" x2="450" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
        
        <rect x="250" y="350" width="250" height="40" fill="#f39c12" rx="5"/>
        <text x="375" y="375" text-anchor="middle" fill="white" font-size="12">输入预计算 → Shared Memory Struct</text>
    </svg>
</div>

<!-- 图3 -->
<div class="figure">

    <svg width="750" height="350" viewBox="0 0 750 350">

        <text x="190" y="75" text-anchor="middle" font-size="14" font-weight="bold">TaskDescriptor 结构体</text>
        
        <text x="50" y="100" font-size="11">task_id        : uint32_t  // Task唯一标识</text>
        <text x="50" y="125" font-size="11">partition_id   : uint32_t  // 所属分区(M/C/H)</text>

        <text x="50" y="200" font-size="11">depend_mask    : uint32_t  // 依赖Task掩码</text>
        <text x="50" y="225" font-size="11">ready_mask     : uint32_t  // 完成状态掩码</text>

        <text x="550" y="125" text-anchor="middle" fill="white" font-size="12">T1</text>
        
        <circle cx="650" cy="120" r="20" fill="#e74c3c"/>
        <text x="650" y="125" text-anchor="middle" fill="white" font-size="12">T2</text>
        
        <circle cx="500" cy="190" r="20" fill="#2ecc71"/>
        <text x="500" y="195" text-anchor="middle" fill="white" font-size="12">T3</text>
        
        <circle cx="600" cy="190" r="20" fill="#2ecc71"/>
        <text x="600" y="195" text-anchor="middle" fill="white" font-size="12">T4</text>
        
        <!-- 边 -->
        <line x1="470" y1="120" x2="530" y2="120" stroke="#666" stroke-width="2"/>
        <line x1="570" y1="120" x2="630" y2="120" stroke="#666" stroke-width="2"/>
        <line x1="470" y1="135" x2="490" y2="175" stroke="#666" stroke-width="2"/>
        <line x1="570" y1="135" x2="590" y2="175" stroke="#666" stroke-width="2"/>
        
        <!-- 说明 -->
        <text x="550" y="275" text-anchor="middle" font-size="11" fill="#7f8c8d">T0无依赖 → 首先执行</text>
        <text x="550" y="295" text-anchor="middle" font-size="11" fill="#7f8c8d">T1,T2依赖T0 → T0完成后执行</text>
        <text x="550" y="315" text-anchor="middle" font-size="11" fill="#7f8c8d">T3,T4依赖T1,T2 → 两者都完成后执行</text>
    </svg>
</div>
